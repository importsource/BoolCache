name: Release

on:
  push:
    tags:
      - "v*.*.*"   # triggers on v0.1.0, v1.2.3, etc.

env:
  CARGO_TERM_COLOR: always
  BIN: boolcache-server

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz

          # Linux ARM64 (AWS Graviton, Raspberry Pi 4+)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true   # needs cross-compiler

          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz

          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64 only)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p boolcache-server

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }} -p boolcache-server

      # ── package ──────────────────────────────────────────────────────────────

      - name: Package (Unix tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          ASSET="boolcache-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p dist/$ASSET
          cp target/${{ matrix.target }}/release/${{ env.BIN }} dist/$ASSET/
          cp README.md docs/replication.md dist/$ASSET/
          tar -C dist -czf dist/${ASSET}.tar.gz $ASSET
          echo "ASSET=dist/${ASSET}.tar.gz" >> $GITHUB_ENV

      - name: Package (Windows zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $asset = "boolcache-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path dist/$asset
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BIN }}.exe" dist/$asset/
          Copy-Item README.md, docs/replication.md dist/$asset/
          Compress-Archive -Path dist/$asset -DestinationPath dist/$asset.zip
          echo "ASSET=dist/$asset.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boolcache-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
